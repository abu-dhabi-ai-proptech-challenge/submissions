name: AI question bot

# The Discord helper, on GitHub: every `question` Issue gets an AI answer
# within minutes, grounded in the public event docs. If the docs don't cover
# it, the bot says so and labels the issue `needs-review` for a human.
# Skips silently until the ANTHROPIC_API_KEY secret is set.
on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

concurrency:
  group: question-bot-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  answer:
    if: contains(github.event.issue.labels.*.name, 'question')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install anthropic

      - name: Answer the question
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::ANTHROPIC_API_KEY not set — question bot skipped."; exit 0
          fi
          python3 .github/scripts/answer_question.py
